version: '3.8'

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: soc-api
    ports:
      - "3000:3000"
    env_file:
      - ./api/.env
    environment:
      - PYTHON_BIN=python3
    restart: always

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://your-server-ip:3000
    container_name: soc-web
    ports:
      - "80:80"
    depends_on:
      - api
    restart: always
